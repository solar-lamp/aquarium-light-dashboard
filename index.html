<!DOCTYPE html>
<html>
<head>
    <title>Aquarium Light Controller</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>

<body>

<div class="container">

    <div class="hero">

        <img
            src="aquarium.jpg"
            class="hero-image">
    
        <div class="hero">

    <img
        src="aquarium.jpg"
        class="hero-image">

    <div class="hero-overlay">

            <div class="hero-content">
    
                <h1>
                    Smart Aquarium Controller
                </h1>
    
                <p>
                    Cloud Connected Lighting System
                </p>
    
                <div class="hero-status">
    
                    <div id="onlineBadge"
                         class="badge online">
                         ● ONLINE
                    </div>
    
                    <div id="lightBadge"
                         class="badge light-off">
                         OFF
                    </div>
    
                    <div id="modeBadge"
                         class="badge mode">
                         AUTO
                    </div>
    
                </div>
    
            </div>
    
        </div>
    
    </div>

    
    
    <div class="card">
    
        <h2>Lighting Schedule</h2>
        <p>
        Current Time:
        <span id="time">00:00:00</span>
        </p>
    
        <div class="status-grid">
    
            <div class="status-item">
                <div class="label">SLOT 1</div>
                <div id="slot1">
                    --:-- → --:--
                </div>
            </div>
    
            <div class="status-item">
                <div class="label">SLOT 2</div>
                <div id="slot2">
                    --:-- → --:--
                </div>
            </div>
    
        </div>

    </div>
    <div class="card">

        <h2>Controls</h2>

        <button
            id="autoBtn"
            onclick="setMode('AUTO')">
            AUTO
        </button>
    
        <button
            id="forceOnBtn"
            onclick="setMode('FORCE_ON')">
            FORCE ON
        </button>
    
        <button
            id="forceOffBtn"
            onclick="setMode('FORCE_OFF')">
            FORCE OFF
        </button>
    </div>

    <div class="card">

        <h2>Schedule Editor</h2>
    
        <p>Slot 1 ON</p>
        <input type="time" id="slot1On">
    
        <p>Slot 1 OFF</p>
        <input type="time" id="slot1Off">
    
        <p>Slot 2 ON</p>
        <input type="time" id="slot2On">
    
        <p>Slot 2 OFF</p>
        <input type="time" id="slot2Off">
    
        <br><br>
    
        <button onclick="saveSchedule()">
            SAVE SCHEDULE
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
