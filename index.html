<!DOCTYPE html>
<html>
<head>
    <title>Aquarium Light Controller</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>

<body>

<div class="container">

    <h1>🐠 Aquarium Light Controller</h1>

    <div class="card">

        <h2>System Status</h2>
    
        <div class="status-grid">
    
            <div class="status-item">
                <div class="label">ONLINE</div>
                <div id="onlineBadge" class="badge online">
                    ● ONLINE
                </div>
            </div>
    
            <div class="status-item">
                <div class="label">LIGHT</div>
                <div id="lightBadge" class="badge light-off">
                    OFF
                </div>
            </div>
    
            <div class="status-item">
                <div class="label">MODE</div>
                <div id="modeBadge" class="badge mode">
                    AUTO
                </div>
            </div>
    
            <div class="status-item">
                <div class="label">TIME</div>
                <div id="time">
                    00:00:00
                </div>
            </div>
    
        </div>

    </div>
    
    <div class="card">
        <h2>Schedule</h2>

        <p>Slot 1: <span id="slot1">--</span></p>
        <p>Slot 2: <span id="slot2">--</span></p>
    </div>
    <div class="card">

        <h2>Controls</h2>

        <button onclick="setMode('AUTO')">
            AUTO
        </button>

        <button onclick="setMode('FORCE_ON')">
            FORCE ON
        </button>

        <button onclick="setMode('FORCE_OFF')">
            FORCE OFF
        </button>

    </div>

    <div class="card">

        <h2>Schedule Editor</h2>
    
        <p>Slot 1 ON</p>
        <input type="time" id="slot1On">
    
        <p>Slot 1 OFF</p>
        <input type="time" id="slot1Off">
    
        <p>Slot 2 ON</p>
        <input type="time" id="slot2On">
    
        <p>Slot 2 OFF</p>
        <input type="time" id="slot2Off">
    
        <br><br>
    
        <button onclick="saveSchedule()">
            SAVE SCHEDULE
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
